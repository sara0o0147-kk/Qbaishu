// 状态
let currentQ = 0;
let answers = []; // 每题记录选项索引

function checkCode() {
    const input = document.getElementById('code-input').value.trim().toUpperCase();
    const valid = VALID_CODES.map(c => c.toUpperCase());
    if (valid.includes(input)) {
        document.getElementById('code-page').style.display = 'none';
        document.getElementById('quiz-page').style.display = 'block';
        showQuestion();
    } else {
        document.getElementById('code-error').textContent = '兑换码无效，请检查后重试';
    }
}

function showQuestion() {
    const q = questions[currentQ];
    document.getElementById('question-num').textContent = `第 ${currentQ + 1} 题 / 共 ${questions.length} 题`;
    document.getElementById('question-text').textContent = q.q;
    document.getElementById('progress-fill').style.width = `${(currentQ / questions.length) * 100}%`;

    // 上一题按钮
    const backBtn = document.getElementById('back-btn');
    backBtn.disabled = currentQ === 0;

    // 下一题按钮：未选时灰色
    const nextBtn = document.getElementById('next-btn');
    const hasAnswer = answers[currentQ] !== undefined;
    nextBtn.className = 'btn-next' + (hasAnswer ? ' active' : '');

    // 渲染选项
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    const prevIndex = answers[currentQ];
    q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn' + (prevIndex === i ? ' selected' : '');
        btn.textContent = opt.text;
        btn.onclick = () => selectOption(i, btn, container);
        container.appendChild(btn);
    });
}

function selectOption(index, btn, container) {
    container.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    answers[currentQ] = index;
    const nextBtn = document.getElementById('next-btn');
    nextBtn.className = 'btn-next active';
}

function goBack() {
    if (currentQ > 0) { currentQ--; showQuestion(); }
}

function goNext() {
    if (answers[currentQ] === undefined) return;
    currentQ++;
    if (currentQ < questions.length) {
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quiz-page').style.display = 'none';
    document.getElementById('result-page').style.display = 'block';

    // 累计每个品种的得分
    const breedScores = new Array(10).fill(0);
    answers.forEach((idx, qIdx) => {
        const scores = questions[qIdx].options[idx].scores;
        scores.forEach((s, b) => { breedScores[b] += s; });
    });

    // 找最高分
    const maxScore = Math.max(...breedScores);
    const winnerIndex = breedScores.indexOf(maxScore);
    const winner = breeds[winnerIndex];

    // 显示猫咪图片
    const imgEl = document.getElementById('result-img');
    imgEl.src = winner.img;
    imgEl.alt = winner.name;
    imgEl.style.display = 'block';

    document.getElementById('result-emoji').textContent = winner.emoji;
    document.getElementById('result-breed').textContent = winner.en;
    document.getElementById('result-title').textContent = `你是${winner.name}`;
    document.getElementById('result-desc').innerHTML = winner.desc;

    // 适合你的猫咪品种
    const breedNames = ['布偶猫','波斯猫','暹罗猫','阿比西尼亚猫','英国短毛猫','缅因猫','孟加拉猫','俄罗斯蓝猫','狸花猫','橘猫'];
    const sorted = breedScores.map((s,i) => ({i, s})).sort((a,b) => b.s - a.s);
    const top3 = sorted.slice(0,3).map(x => breedNames[x.i]);
    document.getElementById('result-match').innerHTML = `
        <div style="font-size:13px;color:#ff8fa3;font-weight:600;margin-bottom:8px;">✦ 与你最契合的猫咪品种</div>
        <div style="font-size:15px;color:#444;line-height:2;">
            🥇 ${top3[0]}<br>
            🥈 ${top3[1]}<br>
            🥉 ${top3[2]}
        </div>
    `;
}

function restart() {
    currentQ = 0;
    answers = [];
    document.getElementById('result-page').style.display = 'none';
    document.getElementById('quiz-page').style.display = 'block';
    showQuestion();
}

document.getElementById('code-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkCode();
});
</script>
